name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Show build output
        run: |
          echo "Root files:"
          ls -la

          echo ""
          echo "dist files:"
          find dist -maxdepth 4 -type f | head -100 || true

          echo ""
          echo "dist/client index:"
          ls -la dist/client/index.html || true

      - name: Add SPA fallback
        run: |
          if [ -f dist/client/index.html ]; then
            cp dist/client/index.html dist/client/404.html
          else
            echo "dist/client/index.html not found"
            exit 1
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Debug Lovable Build

on:
  push:
    branches: [main]

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Inspect build output
        run: |
          echo "Root:"
          ls -la

          echo ""
          echo "Dist tree:"
          find dist -maxdepth 5 -type f | head -200

          echo ""
          echo "HTML files:"
          find dist -name "*.html" -type f || true

          echo ""
          echo "Client files:"
          find dist/client -maxdepth 5 -type f | head -200 || true

          echo ""
          echo "Server files:"
          find dist/server -maxdepth 5 -type f | head -200 || true
